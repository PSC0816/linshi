<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 杨万雪 生日快乐 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* 飘落的爱心 */
        .heart {
            position: fixed;
            font-size: 20px;
            color: #ff6b9d;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 3rem;
            color: #d63384;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #c2185b;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* 蛋糕样式 */
        .cake-container {
            margin: 40px auto;
            position: relative;
            display: inline-block;
        }

        .cake {
            position: relative;
        }

        .candle {
            width: 15px;
            height: 60px;
            background: linear-gradient(to right, #fff 0%, #f8f9fa 50%, #fff 100%);
            border-radius: 3px;
            margin: 0 auto 5px;
            position: relative;
        }

        .flame {
            width: 20px;
            height: 30px;
            background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 50%, #ff5722 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 0.5s ease-in-out infinite alternate;
            box-shadow: 0 0 20px #ff9800, 0 0 40px #ff5722;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flame:hover {
            transform: translateX(-50%) scale(1.2);
        }

        @keyframes flicker {
            0% {
                transform: translateX(-50%) scale(1) rotate(-2deg);
            }
            100% {
                transform: translateX(-50%) scale(1.1) rotate(2deg);
            }
        }

        .cake-layer {
            width: 250px;
            height: 80px;
            background: linear-gradient(to bottom, #f8bbd9 0%, #f48fb1 100%);
            border-radius: 10px 10px 5px 5px;
            margin: 5px auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .cake-layer::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                #fff 0px,
                #fff 20px,
                #f8bbd9 20px,
                #f8bbd9 40px
            );
            border-radius: 10px;
        }

        .cake-layer.bottom {
            width: 300px;
            height: 100px;
            background: linear-gradient(to bottom, #ce93d8 0%, #ab47bc 100%);
        }

        .cake-layer.bottom::before {
            background: repeating-linear-gradient(
                90deg,
                #fff 0px,
                #fff 20px,
                #ce93d8 20px,
                #ce93d8 40px
            );
        }

        .hint {
            color: #c2185b;
            font-size: 0.9rem;
            margin-top: 10px;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 信封样式 - 更精致 */
        .envelope-wrapper {
            margin: 50px auto;
        }

        .envelope-hint {
            color: #c2185b;
            font-size: 1rem;
            margin-bottom: 20px;
            animation: blink 2s ease-in-out infinite;
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: linear-gradient(145deg, #fff 0%, #fff0f5 50%, #ffe4ec 100%);
            border-radius: 8px;
            position: relative;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 
                0 15px 35px rgba(214, 51, 132, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 182, 193, 0.3);
        }

        .envelope:hover {
            transform: translateY(-10px) rotate(-2deg) scale(1.05);
            box-shadow: 
                0 25px 50px rgba(214, 51, 132, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .envelope-body {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(255, 182, 193, 0.1) 49%, rgba(255, 182, 193, 0.1) 51%, transparent 52%);
            background-size: 20px 20px;
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 52%;
            background: linear-gradient(135deg, #ffc8d8 0%, #ff9eb5 50%, #ff85a2 100%);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            z-index: 10;
            box-shadow: inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .envelope-flap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
        }

        .envelope-seal {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #ff6b9d 0%, #e91e63 50%, #c2185b 100%);
            border-radius: 50%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            box-shadow: 
                0 4px 15px rgba(233, 30, 99, 0.5),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            animation: sealPulse 2s ease-in-out infinite;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes sealPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                box-shadow: 0 4px 15px rgba(233, 30, 99, 0.5);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.15); 
                box-shadow: 0 6px 25px rgba(233, 30, 99, 0.7);
            }
        }

        /* 信纸弹窗 - 不透明 */
        .letter-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .letter-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .letter-content-wrapper {
            background: #ffffff !important;
            padding: 45px;
            border-radius: 15px;
            max-width: 520px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            transform: scale(0.8) translateY(50px);
            transition: all 0.4s ease 0.1s;
            position: relative;
            opacity: 1 !important;
        }

        .letter-modal.show .letter-content-wrapper {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 1.6rem;
            cursor: pointer;
            color: #888;
            transition: all 0.3s ease;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #e91e63;
            background: #ffe4ec;
            transform: scale(1.1);
        }

        .letter-content-wrapper h2 {
            color: #d63384;
            margin-bottom: 30px;
            font-size: 1.7rem;
            text-align: center;
        }

        .letter-content-wrapper p {
            color: #444444 !important;
            line-height: 2.3;
            font-size: 1.08rem;
            margin-bottom: 20px;
            text-indent: 2em;
            opacity: 1 !important;
        }

        .letter-content-wrapper .love-text {
            color: #e91e63;
            font-weight: bold;
            font-size: 1.25rem;
            margin-top: 35px;
            text-align: center;
            text-indent: 0;
        }

        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.6);
        }

        /* 烟花效果 */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        .footer {
            margin-top: 50px;
            color: #880e4f;
            font-size: 1rem;
        }

        .heart-big {
            font-size: 3rem;
            animation: heartbeat 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
            75% {
                transform: scale(1.1);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .title {
                font-size: 2rem;
            }
            
            .cake-layer {
                width: 200px;
            }
            
            .cake-layer.bottom {
                width: 240px;
            }
            
            .letter-content-wrapper {
                padding: 35px 25px;
            }
            
            .envelope {
                width: 260px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎂 杨万雪 生日快乐 🎂</h1>
        <p class="subtitle">致我最爱的女孩</p>

        <div class="cake-container">
            <div class="cake">
                <div class="candle">
                    <div class="flame" onclick="blowCandles()" title="点击吹灭蜡烛许愿吧~"></div>
                </div>
                <div class="cake-layer"></div>
                <div class="cake-layer bottom"></div>
            </div>
            <p class="hint">👆 点击火焰吹灭蜡烛许愿</p>
        </div>

        <!-- 信封 -->
        <div class="envelope-wrapper">
            <p class="envelope-hint">💌 这里有一封给你的信，点击打开</p>
            <div class="envelope" onclick="openLetter()">
                <div class="envelope-body">
                    <div class="envelope-flap"></div>
                    <div class="envelope-seal">❤️</div>
                </div>
            </div>
        </div>

        <button class="btn" onclick="startFireworks()">🎆 放烟花庆祝 🎆</button>

        <div class="footer">
            <span class="heart-big">❤️</span>
            <p>爱你的男朋友</p>
            <p id="date"></p>
        </div>
    </div>

    <!-- 信纸弹窗 -->
    <div class="letter-modal" id="letterModal" onclick="closeLetter(event)">
        <div class="letter-content-wrapper" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeLetter()">✕</span>
            <h2>💌 TO：我的女孩 💌</h2>
            <p>很高兴陪你长大了一岁！这是我以男朋友的身份陪你度过的第一个生日，真的很开心我们能相遇。</p>
            <p>我是一个敏感的人，谢谢你能照顾我的情绪。感谢你出现在我的生命里，让我感受到了幸福与温暖。</p>
            <p>往后的岁岁年年，我都希望我们的身边有彼此，相互包容，相互理解，共同成长！</p>
            <p>祝我的女朋友天天开心，岁岁平安。生活温馨美好，梦想成真。</p>
            <p class="love-text">生日快乐！永远爱你 ❤️</p>
        </div>
    </div>

    <script>
        let candleBlown = false;

        // 创建飘落的爱心
        function createHearts() {
            const heartEmojis = ['❤️', '💕', '💗', '💖', '💘', '💝'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }, 300);
        }

        // 吹灭蜡烛
        function blowCandles() {
            if (candleBlown) return;
            
            const flames = document.querySelectorAll('.flame');
            flames.forEach(flame => {
                flame.style.opacity = '0';
                flame.style.transition = 'opacity 0.8s ease';
            });
            
            // 播放庆祝效果
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight
                    );
                }, i * 80);
            }
            
            setTimeout(() => {
                alert('🎂 蜡烛吹灭啦！万雪闭上眼睛许个愿吧~\n✨ 你的愿望一定会实现的！');
            }, 500);
            
            candleBlown = true;
        }

        // 打开信封
        function openLetter() {
            const modal = document.getElementById('letterModal');
            modal.classList.add('show');
            
            // 放烟花庆祝
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight * 0.7
                    );
                }, i * 100);
            }
        }

        // 关闭信纸
        function closeLetter(event) {
            if (event && event.target !== event.currentTarget) return;
            const modal = document.getElementById('letterModal');
            modal.classList.remove('show');
        }

        // 创建烟花
        function createFirework(x, y) {
            const colors = ['#ff6b9d', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b6b', '#c44569'];
            const particles = 15;
            
            for (let i = 0; i < particles; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = '8px';
                particle.style.height = '8px';
                particle.style.borderRadius = '50%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (i / particles) * Math.PI * 2;
                const velocity = 100 + Math.random() * 100;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                document.body.appendChild(particle);
                
                let posX = x;
                let posY = y;
                let opacity = 1;
                
                const animate = () => {
                    posX += vx * 0.02;
                    posY += vy * 0.02 + 2;
                    opacity -= 0.02;
                    
                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = opacity;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                
                requestAnimationFrame(animate);
            }
        }

        // 开始烟花表演
        function startFireworks() {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight * 0.6
                    );
                }, i * 250);
            }
        }

        // 设置日期
        document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // 初始化
        createHearts();
        
        // 自动放几个烟花
        setTimeout(() => {
            startFireworks();
        }, 1000);
    </script>
</body>
</html>
